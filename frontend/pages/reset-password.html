<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — ForgeGym</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-shell">

  <div class="auth-visual">
    <div class="visual-bg"></div>
    <div class="visual-grid"></div>
    <div class="visual-number">04</div>
    <div class="visual-content">
      <div class="visual-tag">New Password</div>
      <h1>Fresh <span>Start.</span></h1>
      <p>Enter the code from your email and choose a new password.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">

      <div class="card-header">
        <h2>Reset Password</h2>
        <p>Enter your code and new password</p>
      </div>

      <div class="email-badge" id="email-badge">✉ loading...</div>

      <div class="alert alert-error" id="error-msg"></div>

      <div class="form-group">
        <label>Reset Code</label>
        <div class="otp-row" id="otp-row">
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
          <input type="text" maxlength="1" inputmode="numeric" />
        </div>
      </div>

      <div class="form-group">
        <label for="new-password">New Password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters" autocomplete="new-password" />
      </div>

      <button class="btn-primary" id="reset-btn" onclick="handleReset()">
        Reset Password
      </button>

    </div>
  </div>
</div>

<script type="module">
  import { resetPassword } from "../api/auth.js";

  const email = sessionStorage.getItem("reset_email");
  if (!email) location.href = "forgot-password.html";

  document.getElementById("email-badge").textContent = "✉ " + email;

  const inputs    = Array.from(document.querySelectorAll("#otp-row input"));
  const newPassEl = document.getElementById("new-password");
  const btn       = document.getElementById("reset-btn");
  const errorEl   = document.getElementById("error-msg");

  inputs.forEach((inp, i) => {
    inp.addEventListener("input", () => {
      inp.value = inp.value.replace(/\D/, "").slice(-1);
      if (inp.value && i < 5) inputs[i + 1].focus();
    });
    inp.addEventListener("keydown", e => {
      if (e.key === "Backspace" && !inp.value && i > 0) inputs[i - 1].focus();
    });
    inp.addEventListener("paste", e => {
      const pasted = (e.clipboardData || window.clipboardData).getData("text").replace(/\D/g, "");
      if (pasted.length === 6) {
        pasted.split("").forEach((ch, j) => { if (inputs[j]) inputs[j].value = ch; });
        inputs[5].focus();
        e.preventDefault();
      }
    });
  });

  function getOTP() { return inputs.map(i => i.value).join(""); }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add("visible");
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span> Resetting...'
      : "Reset Password";
  }

  window.handleReset = async function () {
    errorEl.classList.remove("visible");
    const otp     = getOTP();
    const newPass = newPassEl.value;

    if (otp.length < 6)     return showError("Please enter the full 6-digit code.");
    if (newPass.length < 8) return showError("Password must be at least 8 characters.");

    setLoading(true);
    try {
      const data = await resetPassword(email, otp, newPass);
      localStorage.setItem("access",  data.access_token);
      localStorage.setItem("refresh", data.refresh_token);
      localStorage.setItem("email",   email);
      sessionStorage.removeItem("reset_email");
      location.href = "dashboard.html";
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  };

  newPassEl.addEventListener("keydown", e => { if (e.key === "Enter") handleReset(); });
</script>

</body>
</html>
