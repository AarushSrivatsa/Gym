<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ForgeGym</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div class="auth-shell">

  <div class="auth-visual">
    <div class="visual-bg"></div>
    <div class="visual-grid"></div>
    <div class="visual-number">03</div>
    <div class="visual-content">
      <div class="visual-tag">Recovery</div>
      <h1>Reset your <span>Access.</span></h1>
      <p>Enter your email and we'll send a one-time code to reset your password.</p>
    </div>
  </div>

  <div class="auth-form-side">
    <div class="auth-card">

      <div class="card-header">
        <h2>Forgot Password</h2>
        <p>We'll send a reset code to your email</p>
      </div>

      <div class="alert alert-error"   id="error-msg"></div>
      <div class="alert alert-success" id="success-msg"></div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <button class="btn-primary" id="send-btn" onclick="handleSend()">
        Send Reset Code
      </button>

      <p class="footer-text">
        Remember it? <a class="link" href="login.html">Back to login</a>
      </p>

    </div>
  </div>
</div>

<script type="module">
  import { sendResetOTP } from "../api/auth.js";

  const emailEl   = document.getElementById("email");
  const btn       = document.getElementById("send-btn");
  const errorEl   = document.getElementById("error-msg");
  const successEl = document.getElementById("success-msg");

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add("visible");
    successEl.classList.remove("visible");
  }

  function setLoading(on) {
    btn.disabled = on;
    btn.innerHTML = on
      ? '<span class="spinner"></span> Sending...'
      : "Send Reset Code";
  }

  window.handleSend = async function () {
    errorEl.classList.remove("visible");
    const email = emailEl.value.trim();
    if (!email) return showError("Please enter your email.");

    setLoading(true);
    try {
      await sendResetOTP(email);
      sessionStorage.setItem("reset_email", email);
      location.href = "reset-password.html";
    } catch (e) {
      showError(e.message);
    } finally {
      setLoading(false);
    }
  };

  emailEl.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });
</script>

</body>
</html>
